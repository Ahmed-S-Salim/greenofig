<!DOCTYPE html>
<html>
  <head>
    <base href="/greenofig/" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="Greenofig - Your AI-powered health and fitness companion" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="persistent_project" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>greenofig</title>
    <link rel="manifest" href="manifest.json" />

    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        position: fixed;
        overflow: hidden;
        background: #000;
        -webkit-text-size-adjust: none;
        -moz-text-size-adjust: none;
        text-size-adjust: none;
        -webkit-font-smoothing: antialiased;
        touch-action: pan-x pan-y;
      }

      #loading-container {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        width: 100%;
        height: 100%;
        background-color: black;
        top: 0;
        left: 0;
        z-index: 9999;
      }

      .loader {
        border: 6px solid rgba(255, 255, 255, 0.2);
        border-top: 6px solid #87ceeb;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Force Flutter to render at correct size */
      flt-glass-pane {
        width: 100% !important;
        height: 100% !important;
      }

      /* Desktop: constrain to mobile size */
      @media (min-width: 480px) {
        html {
          background: #1a1a1a;
          display: flex;
          justify-content: center;
          align-items: center;
        }

        body {
          width: 390px !important;
          max-width: 390px !important;
          height: 844px !important;
          max-height: 90vh !important;
          position: relative !important;
          box-shadow: 0 0 50px rgba(0,0,0,0.8);
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body
    style="
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    "
  >
    <!-- Loader Container -->
    <div id="loading-container">
      <div class="loader"></div>
    </div>

    <script src="flutter.js" defer></script>

    <script>
      var scriptLoaded = false;

      function loadMainDartJs() {
        if (scriptLoaded) return;
        scriptLoaded = true;
        var scriptTag = document.createElement("script");
        scriptTag.src = "main.dart.js";
        scriptTag.type = "application/javascript";
        document.body.appendChild(scriptTag);
      }

      function removeLoader() {
        var loader = document.getElementById("loading-container");
        if (loader) {
          loader.style.display = "none";
        }
      }

      window.addEventListener("flutter-first-frame", function () {
        removeLoader();
        window.parent.postMessage({ type: "LOADING_COMPLETED", }, "*");
      });

      loadMainDartJs();
    </script>

    <script>
      // Navigation tracking
      (function (history) {
        const pushState = history.pushState;
        const replaceState = history.replaceState;

        function logNavigation(method, url) {
          // console.log(`[IN FLUTTER APP] - Navigated (${method}): ${url}`);
          window.parent.postMessage({ type: "NAVIGATION", method, url }, "*");
        }

        history.pushState = function (state, title, url) {
          logNavigation("pushState", url);
          return pushState.apply(history, arguments);
        };

        history.replaceState = function (state, title, url) {
          logNavigation("replaceState", url);
          return replaceState.apply(history, arguments);
        };

        window.addEventListener("popstate", function (event) {
          logNavigation("popstate", location.href);
        });
      })(window.history);
    </script>

    <!-- Plugin initialization code will be injected into flutter_plugins.js -->
    <script src="flutter_plugins.js" defer></script>
    <script type="module" src="https://static.rocket.new/rocket-shot.js?v=0.0.1"></script>
  </body>
</html>
